<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Women Safety App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-shield-heart"></i>
                <h1>SafeHer</h1>
            </div>
            <div class="user-profile">
                <img src="https://i.pravatar.cc/150?img=47" alt="User Profile">
            </div>
        </header>

        <!-- Main SOS Section -->
        <section class="sos-section">
            <div class="sos-container">
                <button id="sosButton" class="sos-btn">
                    <span class="sos-text">SOS</span>
                    <span class="sos-subtext">Tap to send alert</span>
                </button>
                <div class="pulse-ring"></div>
            </div>
            <p id="sosStatus" class="sos-status">System Armed & Ready</p>
        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
            <div class="action-card" onclick="triggerSiren()">
                <div class="icon red-icon"><i class="fa-solid fa-volume-high"></i></div>
                <span>Loud Siren</span>
            </div>
            <div class="action-card" onclick="fakeCall()">
                <div class="icon green-icon"><i class="fa-solid fa-phone"></i></div>
                <span>Fake Call</span>
            </div>
            <div class="action-card" onclick="shareLocation()">
                <div class="icon blue-icon"><i class="fa-solid fa-location-dot"></i></div>
                <span>Share Loc</span>
            </div>
            <div class="action-card">
                <div class="icon purple-icon"><i class="fa-solid fa-video"></i></div>
                <span>Record</span>
            </div>
        </section>

        <!-- Trusted Contacts -->
        <section class="trusted-contacts">
            <div class="section-header">
                <h2>Trusted Contacts</h2>
                <button class="add-btn"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="contacts-list">
                <div class="contact-card">
                    <img src="https://i.pravatar.cc/150?img=32" alt="Mom">
                    <div class="contact-info">
                        <h3>Mom</h3>
                        <p>+1 234 567 8900</p>
                    </div>
                    <button class="call-btn"><i class="fa-solid fa-phone"></i></button>
                </div>
                <div class="contact-card">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Dad">
                    <div class="contact-info">
                        <h3>Dad</h3>
                        <p>+1 987 654 3210</p>
                    </div>
                    <button class="call-btn"><i class="fa-solid fa-phone"></i></button>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-map-location-dot"></i>
                <span>Map</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-book-open"></i>
                <span>Tips</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <!-- Modals -->
    <div id="countdownModal" class="modal hidden">
        <div class="modal-content">
            <h2>Sending Alerts in...</h2>
            <div id="countdownTimer" class="timer">5</div>
            <p>Alerting trusted contacts and local authorities with your live location.</p>
            <button id="cancelSosBtn" class="cancel-btn">Cancel SOS</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
